<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport: viewport-fit=cover for iOS Liquid Glass / notch ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />

    <!-- ── Primary ──────────────────────────────────────────────────── -->
    <title>انگلیسی سفر مالزی 🇲🇾</title>
    <meta name="description" content="عبارات کاربردی انگلیسی برای سفر به مالزی — آفلاین کار می‌کند" />
    <meta name="theme-color" content="#010066" />

    <!-- ── Favicon / PWA icons ──────────────────────────────────────── -->
    <link rel="icon"             type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="manifest"                              href="%BASE_URL%manifest.webmanifest" />

    <!-- ── iOS PWA: core ────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <!-- black-translucent → content extends under status bar = Liquid Glass -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="مالزی" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />

          media="screen and (device-width:440px) and (device-height:956px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)"/>
